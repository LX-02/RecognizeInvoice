<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>发票识别 MVP</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #687385;
        --line: #dfe3ea;
        --accent: #176b87;
        --accent-2: #1f8a70;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 20px;
      }

      section {
        min-width: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-header h2 {
        margin: 0;
        font-size: 16px;
      }

      .upload-box {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px dashed var(--line);
        border-radius: 6px;
        background: #fbfcfd;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        min-height: 38px;
        padding: 8px 12px;
      }

      button.secondary {
        background: white;
        color: var(--accent);
        border-color: var(--accent);
      }

      button.success {
        background: var(--accent-2);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .history {
        max-height: calc(100vh - 230px);
        overflow: auto;
      }

      .file-row {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: white;
        color: var(--text);
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 12px;
        padding: 12px 16px;
        text-align: left;
      }

      .file-row:hover,
      .file-row.active {
        background: #eef7f6;
      }

      .thumb {
        width: 72px;
        height: 72px;
        border: 1px solid var(--line);
        border-radius: 6px;
        object-fit: cover;
        background: #f2f4f7;
      }

      .thumb.pdf-thumb {
        display: grid;
        place-items: center;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
      }

      .file-name {
        font-size: 14px;
        font-weight: 650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(260px, 42%) minmax(0, 1fr);
        gap: 20px;
      }

      .preview-wrap {
        padding: 16px;
      }

      .preview {
        width: 100%;
        max-height: 650px;
        object-fit: contain;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fafc;
      }

      .pdf-preview {
        height: 650px;
      }

      .empty-preview {
        min-height: 360px;
        border: 1px dashed var(--line);
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      .actions {
        padding: 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
      }

      .model-picker {
        min-width: 220px;
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      select {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
        color: var(--text);
        font: inherit;
        padding: 8px 10px;
      }

      select:disabled {
        opacity: 0.55;
      }

      pre {
        margin: 0;
        overflow: auto;
        padding: 14px;
        background: #101828;
        color: #d1fadf;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .result-view {
        max-height: 650px;
        overflow: auto;
        padding: 16px;
      }

      .result-meta {
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .result-empty {
        min-height: 420px;
        border: 1px dashed var(--line);
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      .table-title {
        margin: 16px 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .table-title:first-child {
        margin-top: 0;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: auto;
        background: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
        line-height: 1.45;
      }

      th {
        background: #f2f5f8;
        color: #344054;
        font-weight: 700;
        white-space: nowrap;
      }

      tr:last-child th,
      tr:last-child td {
        border-bottom: 0;
      }

      .field-name {
        width: 150px;
        color: #344054;
        font-weight: 650;
        white-space: nowrap;
      }

      .field-value {
        word-break: break-word;
      }

      .muted-value {
        color: var(--muted);
      }

      details {
        margin-top: 16px;
      }

      summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 900px) {
        main,
        .content-grid {
          grid-template-columns: 1fr;
        }

        .history {
          max-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>发票识别 MVP</h1>
        <div id="status" class="status">准备就绪</div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-header">
          <h2>上传与历史</h2>
          <button id="refreshBtn" class="secondary" type="button">刷新</button>
        </div>
        <div class="upload-box">
          <input id="fileInput" type="file" accept="image/*,.pdf" />
          <button id="uploadBtn" type="button">上传文件</button>
        </div>
        <div id="history" class="history"></div>
      </section>

      <section class="content-grid">
        <div class="panel">
          <div class="panel-header">
            <h2>文件预览</h2>
          </div>
          <div class="preview-wrap" id="previewWrap">
            <div class="empty-preview">请选择或上传一张发票图片</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>识别结果</h2>
          </div>
          <div class="actions">
            <label class="model-picker" for="modelSelect">
              <span>识别模型</span>
              <select id="modelSelect"></select>
            </label>
            <button id="recognizeBtn" class="success" type="button" disabled>提交识别</button>
            <button id="loadResultBtn" class="secondary" type="button" disabled>查看该模型结果</button>
          </div>
          <div id="result" class="result-view"></div>
        </div>
      </section>
    </main>

    <script>
      const state = {
        files: [],
        selected: null,
        busy: false,
        fieldMapping: null,
        models: [],
        defaultModelKey: "",
        selectedModelKey: "",
      };

      const DEFAULT_FIELD_MAPPING = {
        groups: [
          {
            title: "发票身份",
            fields: [
              { key: "invoice_type", label: "发票类型" },
              { key: "invoice_code", label: "发票代码" },
              { key: "invoice_number", label: "发票号码" },
              { key: "digital_invoice_number", label: "数电票号码" },
              { key: "issue_date", label: "开票日期" },
              { key: "check_code", label: "校验码" },
            ],
          },
          {
            title: "购买方信息",
            fields: [
              { key: "buyer_name", label: "购买方名称" },
              { key: "buyer_tax_id", label: "购买方税号" },
            ],
          },
          {
            title: "销售方信息",
            fields: [
              { key: "seller_name", label: "销售方名称" },
              { key: "seller_tax_id", label: "销售方税号" },
            ],
          },
          {
            title: "金额和税额",
            fields: [
              { key: "amount_without_tax", label: "不含税金额" },
              { key: "tax_rate", label: "税率/征收率" },
              { key: "tax_amount", label: "税额" },
              { key: "total_amount", label: "价税合计小写" },
              { key: "total_amount_cn", label: "价税合计大写" },
            ],
          },
          {
            title: "辅助信息",
            fields: [
              { key: "remark", label: "备注" },
              { key: "issuer", label: "开票人" },
              { key: "ocr_text", label: "OCR 原文" },
            ],
          },
        ],
        items: {
          title: "发票明细",
          fields: [
            { key: "name", label: "项目名称" },
            { key: "spec", label: "规格型号" },
            { key: "unit", label: "单位" },
            { key: "quantity", label: "数量" },
            { key: "unit_price", label: "单价" },
            { key: "amount", label: "金额" },
            { key: "tax_rate", label: "税率" },
            { key: "tax_amount", label: "税额" },
          ],
        },
      };

      const els = {
        status: document.getElementById("status"),
        fileInput: document.getElementById("fileInput"),
        uploadBtn: document.getElementById("uploadBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        history: document.getElementById("history"),
        previewWrap: document.getElementById("previewWrap"),
        modelSelect: document.getElementById("modelSelect"),
        recognizeBtn: document.getElementById("recognizeBtn"),
        loadResultBtn: document.getElementById("loadResultBtn"),
        result: document.getElementById("result"),
      };

      function setStatus(text, isError = false) {
        els.status.textContent = text;
        els.status.className = isError ? "status error" : "status";
      }

      function setBusy(value) {
        state.busy = value;
        els.uploadBtn.disabled = value;
        els.refreshBtn.disabled = value;
        els.modelSelect.disabled = value || !state.models.length;
        els.recognizeBtn.disabled = value || !state.selected || !state.selectedModelKey;
        els.loadResultBtn.disabled = value || !selectedModelHasResult();
      }

      function modelLabel(modelKey) {
        return state.models.find((model) => model.key === modelKey)?.label || modelKey || "";
      }

      function selectedModelHasResult() {
        if (!state.selected || !state.selectedModelKey) return false;
        const resultKeys = state.selected.result_model_keys || [];
        if (resultKeys.includes(state.selectedModelKey)) return true;
        return Boolean(state.selected.has_legacy_result && state.selectedModelKey === state.defaultModelKey);
      }

      function formatBytes(size) {
        if (size < 1024) return `${size} B`;
        if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
        return `${(size / 1024 / 1024).toFixed(1)} MB`;
      }

      function formatDate(value) {
        if (!value) return "";
        return new Date(value).toLocaleString();
      }

      function valueText(value) {
        if (value === null || value === undefined || value === "") return "-";
        if (Array.isArray(value)) return value.length ? JSON.stringify(value) : "-";
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      }

      function appendCell(row, text, tagName = "td", className = "") {
        const cell = document.createElement(tagName);
        cell.className = className;
        cell.textContent = valueText(text);
        if (cell.textContent === "-") {
          cell.classList.add("muted-value");
        }
        row.appendChild(cell);
        return cell;
      }

      function createSectionTitle(text) {
        const title = document.createElement("div");
        title.className = "table-title";
        title.textContent = text;
        return title;
      }

      function createEmptyMessage(className, text) {
        const empty = document.createElement("div");
        empty.className = className;
        empty.textContent = text;
        return empty;
      }

      function appendLine(container, text) {
        if (container.childNodes.length) {
          container.appendChild(document.createElement("br"));
        }
        container.appendChild(document.createTextNode(text));
      }

      function isPdf(file) {
        return file?.content_type === "application/pdf" || file?.filename?.toLowerCase().endsWith(".pdf");
      }

      function createKeyValueTable(fields, data) {
        const wrap = document.createElement("div");
        wrap.className = "table-wrap";
        const table = document.createElement("table");
        const tbody = document.createElement("tbody");

        for (const field of fields) {
          const row = document.createElement("tr");
          appendCell(row, field.label, "th", "field-name");
          appendCell(row, data?.[field.key], "td", "field-value");
          tbody.appendChild(row);
        }

        table.appendChild(tbody);
        wrap.appendChild(table);
        return wrap;
      }

      function createItemsTable(items, fields) {
        const wrap = document.createElement("div");
        wrap.className = "table-wrap";
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        for (const field of fields) {
          appendCell(headRow, field.label, "th");
        }
        thead.appendChild(headRow);

        const tbody = document.createElement("tbody");
        const rows = Array.isArray(items) && items.length ? items : [{}];
        for (const item of rows) {
          const row = document.createElement("tr");
          for (const field of fields) {
            appendCell(row, item?.[field.key]);
          }
          tbody.appendChild(row);
        }

        table.append(thead, tbody);
        wrap.appendChild(table);
        return wrap;
      }

      function renderResult(payload) {
        els.result.replaceChildren();
        if (!payload) {
          els.result.replaceChildren(createEmptyMessage("result-empty", "暂无识别结果"));
          return;
        }

        const data = payload.result || payload;
        const mapping = state.fieldMapping || DEFAULT_FIELD_MAPPING;
        const metaLines = [];
        const resultModelLabel = payload.model_label || modelLabel(payload.model_key) || payload.model;
        if (resultModelLabel) metaLines.push(`模型：${resultModelLabel}`);
        if (payload.model) metaLines.push(`模型 ID：${payload.model}`);
        if (payload.recognized_at) metaLines.push(`识别时间：${formatDate(payload.recognized_at)}`);
        if (metaLines.length) {
          const meta = document.createElement("div");
          meta.className = "result-meta";
          for (const line of metaLines) {
            appendLine(meta, line);
          }
          els.result.appendChild(meta);
        }

        for (const group of mapping.groups || []) {
          els.result.append(createSectionTitle(group.title), createKeyValueTable(group.fields || [], data));
        }

        const itemMapping = mapping.items || DEFAULT_FIELD_MAPPING.items;
        els.result.append(createSectionTitle(itemMapping.title), createItemsTable(data.items, itemMapping.fields || []));

        const details = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = "查看原始 JSON";
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(payload, null, 2);
        details.append(summary, pre);
        els.result.appendChild(details);
      }

      async function loadFieldMapping() {
        try {
          state.fieldMapping = await requestJson("/static/field-mapping.json");
        } catch {
          state.fieldMapping = DEFAULT_FIELD_MAPPING;
        }
      }

      function renderModelOptions() {
        els.modelSelect.replaceChildren();
        for (const model of state.models) {
          const option = document.createElement("option");
          option.value = model.key;
          option.textContent = model.label;
          els.modelSelect.appendChild(option);
        }
        els.modelSelect.value = state.selectedModelKey;
      }

      async function loadModels() {
        const data = await requestJson("/api/models");
        state.models = data.models || [];
        state.defaultModelKey = data.default || state.models[0]?.key || "";
        state.selectedModelKey = state.selectedModelKey || state.defaultModelKey;
        renderModelOptions();
      }

      function renderHistory() {
        els.history.replaceChildren();
        if (!state.files.length) {
          els.history.replaceChildren(createEmptyMessage("empty-preview", "暂无上传记录"));
          return;
        }

        for (const file of state.files) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `file-row ${state.selected?.id === file.id ? "active" : ""}`;
          let thumb = null;
          if (isPdf(file)) {
            thumb = document.createElement("div");
            thumb.className = "thumb pdf-thumb";
            thumb.textContent = "PDF";
          } else {
            thumb = document.createElement("img");
            thumb.className = "thumb";
            thumb.src = `/uploads/${file.id}`;
            thumb.alt = "";
          }

          const info = document.createElement("div");
          const name = document.createElement("div");
          name.className = "file-name";
          name.title = file.filename;
          name.textContent = file.filename;

          const meta = document.createElement("div");
          meta.className = "meta";
          appendLine(meta, formatBytes(file.size));
          appendLine(meta, formatDate(file.uploaded_at));
          appendLine(meta, file.has_result ? "已有识别结果" : "未识别");
          const resultKeys = file.result_model_keys || [];
          if (resultKeys.length) {
            appendLine(meta, `结果模型：${resultKeys.map(modelLabel).join("、")}`);
          } else if (file.has_legacy_result) {
            appendLine(meta, "结果模型：旧版默认结果");
          }

          info.append(name, meta);
          row.append(thumb, info);
          row.addEventListener("click", () => selectFile(file));
          els.history.appendChild(row);
        }
      }

      function selectFile(file) {
        state.selected = file;
        const preview = document.createElement(isPdf(file) ? "object" : "img");
        preview.className = `preview ${isPdf(file) ? "pdf-preview" : ""}`;
        if (isPdf(file)) {
          preview.data = `/uploads/${file.id}`;
          preview.type = "application/pdf";
        } else {
          preview.src = `/uploads/${file.id}`;
          preview.alt = file.filename;
        }
        els.previewWrap.replaceChildren(preview);
        renderResult(null);
        renderHistory();
        setBusy(false);
        setStatus(`已选择：${file.filename}`);
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          data = text;
        }
        if (!response.ok) {
          const message = data?.detail || data || response.statusText;
          throw new Error(message);
        }
        return data;
      }

      async function loadFiles(keepSelection = true) {
        setBusy(true);
        try {
          state.files = await requestJson("/api/files");
          if (keepSelection && state.selected) {
            state.selected = state.files.find((item) => item.id === state.selected.id) || state.selected;
          }
          renderHistory();
          setStatus(`历史记录：${state.files.length} 张`);
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      async function uploadFile() {
        const file = els.fileInput.files[0];
        if (!file) {
          setStatus("请先选择图片", true);
          return;
        }

        setBusy(true);
        setStatus("正在上传...");
        try {
          const formData = new FormData();
          formData.append("file", file);
          const data = await requestJson("/api/upload", {
            method: "POST",
            body: formData,
          });
          await loadFiles(false);
          const selected = state.files.find((item) => item.id === data.file.id) || data.file;
          selectFile(selected);
          setStatus(data.duplicate ? "图片已存在，已复用历史记录" : "上传完成");
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      async function recognize() {
        if (!state.selected || !state.selectedModelKey) return;
        setBusy(true);
        setStatus(`正在调用 ${modelLabel(state.selectedModelKey)}...`);
        try {
          const data = await requestJson(`/api/recognize/${state.selected.id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model_key: state.selectedModelKey }),
          });
          renderResult(data);
          await loadFiles(true);
          setStatus("识别完成");
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      async function loadResult() {
        if (!state.selected || !state.selectedModelKey) return;
        setBusy(true);
        try {
          const query = new URLSearchParams({ model_key: state.selectedModelKey });
          const data = await requestJson(`/api/results/${state.selected.id}?${query}`);
          renderResult(data);
          setStatus(`已加载 ${modelLabel(state.selectedModelKey)} 结果`);
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      els.uploadBtn.addEventListener("click", uploadFile);
      els.refreshBtn.addEventListener("click", () => loadFiles(true));
      els.recognizeBtn.addEventListener("click", recognize);
      els.loadResultBtn.addEventListener("click", loadResult);
      els.modelSelect.addEventListener("change", () => {
        state.selectedModelKey = els.modelSelect.value;
        renderResult(null);
        setBusy(false);
        setStatus(`已选择模型：${modelLabel(state.selectedModelKey)}`);
      });

      async function boot() {
        await loadModels();
        await loadFieldMapping();
        renderResult(null);
        await loadFiles(false);
      }

      boot();
    </script>
